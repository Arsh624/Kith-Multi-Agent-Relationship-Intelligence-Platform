<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kith</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root {
      --bg: #131212; --surface: #1a1919; --surface-2: #242122; --surface-3: #2d2929;
      --border: #2a2727; --border-strong: #3b3636;
      --text: #ece6e7; --dim: #b3aaaa; --faint: #8a7f7f;
      --accent: #e2546f; --accent-hover: #f36b82; --accent-contrast: #ffffff;
      --error: #f3837e; --shadow: 0 14px 44px rgba(0,0,0,.55);
      --cy-1: #181615; --cy-2: #0d0c0c;
    }
    [data-theme="light"] {
      --bg: #fdfcfc; --surface: #faf8f8; --surface-2: #f3eff0; --surface-3: #ece6e7;
      --border: #ece6e7; --border-strong: #ddd4d5;
      --text: #2a2727; --dim: #6b6363; --faint: #978889;
      --accent: #d8455f; --accent-hover: #c9455f; --accent-contrast: #ffffff;
      --error: #c0403d; --shadow: 0 14px 44px rgba(70,34,26,.14);
      --cy-1: #f1edee; --cy-2: #e4dcdd;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Hanken Grotesk', system-ui, sans-serif; margin: 0; color: var(--text);
      background: var(--bg); font-size: 15px; line-height: 1.45; min-height: 100vh;
      -webkit-font-smoothing: antialiased; transition: background .2s, color .2s; }
    h1, h2, h3, .display { font-family: 'Space Grotesk', sans-serif; letter-spacing: -.02em; font-weight: 600; }
    header { display: flex; justify-content: space-between; align-items: center; gap: 12px;
      padding: 15px 24px; border-bottom: 1px solid var(--border); }
    .brand { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 21px; letter-spacing: -.03em; }
    .headright { display: flex; align-items: center; gap: 10px; }
    #app { display: none; }

    input, textarea, select { font: inherit; color: var(--text); background: var(--surface);
      border: 1px solid var(--border-strong); border-radius: 10px; padding: 9px 12px; }
    input::placeholder, textarea::placeholder { color: var(--faint); }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 26%, transparent); }

    button { font: inherit; font-weight: 600; cursor: pointer; color: var(--accent-contrast);
      background: var(--accent); border: 1px solid transparent; border-radius: 10px; padding: 9px 16px;
      transition: background .12s, transform .04s; }
    button:hover { background: var(--accent-hover); }
    button:active { transform: translateY(1px); }
    button.secondary { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
    button.secondary:hover { background: var(--surface-3); }
    button.ghost { background: transparent; border: none; color: var(--dim); font-weight: 600; padding: 8px 6px; }
    button.ghost:hover { color: var(--text); }
    .iconbtn { padding: 8px 11px; font-size: 15px; line-height: 1; background: var(--surface-2);
      color: var(--text); border: 1px solid var(--border-strong); }
    .iconbtn.danger { color: var(--accent); }
    .iconbtn.danger:hover { background: var(--accent); color: var(--accent-contrast); }
    .themetoggle { background: var(--surface-2); color: var(--text); border: 1px solid var(--border-strong);
      border-radius: 10px; padding: 8px 12px; font-size: 15px; }

    #auth { max-width: 360px; margin: 12vh auto; padding: 32px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); }
    #auth h2 { margin: 0 0 6px; font-size: 27px; }
    #auth input { width: 100%; margin: 6px 0; }

    .tabs { display: flex; gap: 4px; padding: 0 24px; border-bottom: 1px solid var(--border); }
    .tab { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px; color: var(--dim);
      background: transparent; border: none; border-bottom: 2px solid transparent; border-radius: 0;
      padding: 15px 14px 13px; cursor: pointer; }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--text); border-bottom-color: var(--accent); }

    #tasksView { padding: 34px 24px; max-width: 700px; }
    #greeting { font-size: 30px; margin: 0 0 24px; font-weight: 600; }
    .taskform { display: flex; gap: 8px; flex-wrap: wrap; margin: 0 0 24px; align-items: center; }
    .taskform input, .taskform select { width: auto; }
    .taskform #taskTitle { flex: 1; min-width: 200px; }
    .tasklist { list-style: none; padding: 0; margin: 0; }
    .taskrow { display: flex; align-items: center; gap: 13px; padding: 14px 4px;
      border-bottom: 1px solid var(--border); }
    .taskrow.done { opacity: .5; }
    .taskrow.done .tasktitle { text-decoration: line-through; }
    .taskrow input[type=checkbox] { width: 17px; height: 17px; accent-color: var(--accent); }
    .tasktitle { flex: 1; font-weight: 500; }
    .badge { font-size: 10px; padding: 3px 9px; border-radius: 999px; color: #fff; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em; }
    .badge.high { background: #d9434a; } .badge.medium { background: #c98b2c; } .badge.low { background: #4f8fc4; }
    .deadline { color: var(--dim); font-size: 12px; }
    .taskdel { background: transparent; border: none; color: var(--faint); padding: 2px 6px; font-weight: 600; }
    .taskdel:hover { color: var(--accent); }

    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 12px 24px;
      border-bottom: 1px solid var(--border); }
    .tgroup { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .toolbar input { width: auto; min-width: 150px; }
    details.tools { position: relative; }
    details.tools > summary { list-style: none; cursor: pointer; font-weight: 600; color: var(--text);
      background: var(--surface-2); border: 1px solid var(--border-strong); border-radius: 10px; padding: 9px 15px; }
    details.tools > summary::-webkit-details-marker { display: none; }
    .toolsmenu { position: absolute; z-index: 20; margin-top: 8px; min-width: 250px; display: flex;
      flex-direction: column; gap: 8px; padding: 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); }
    .toolrow { display: flex; gap: 6px; }
    .toolrow input { flex: 1; min-width: 0; }

    #paste { display: none; padding: 14px 24px; border-bottom: 1px solid var(--border); }
    #paste textarea { width: 100%; margin: 6px 0; }
    #cy { height: calc(100vh - 118px);
      background: radial-gradient(circle at 50% 30%, var(--cy-1) 0%, var(--cy-2) 80%); }

    .muted { color: var(--dim); font-size: 13px; }
    .error { color: var(--error); font-size: 13px; }
    .legend { display: flex; gap: 14px; align-items: center; margin-left: auto; color: var(--dim); font-size: 12px; }
    .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

    #personCard { position: fixed; top: 140px; right: 26px; width: 290px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 16px; padding: 18px; box-shadow: var(--shadow); }
    #personCard input { width: 100%; margin: 3px 0; }
    .cardhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
    .cardhead strong { font-family: 'Space Grotesk', sans-serif; font-size: 18px; }
    .cardlabel { font-size: 10px; color: var(--dim); display: block; margin-top: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; }
    .cardactions { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <header>
    <span class="brand">Kith</span>
    <div class="headright">
      <button id="themeToggle" class="themetoggle" title="Toggle light / dark" onclick="toggleTheme()">&#9790;</button>
      <button id="logout" class="secondary" style="display:none" onclick="logout()">Log out</button>
    </div>
  </header>

  <div id="auth">
    <h2>Sign in</h2>
    <input id="email" type="email" placeholder="email" />
    <input id="password" type="password" placeholder="password" />
    <div style="display:flex; gap:8px; margin-top:6px;">
      <button onclick="login()">Log in</button>
      <button class="secondary" onclick="register()">Register</button>
    </div>
    <p class="muted" style="margin-top:8px">First time here? Press Register. Coming back? Press Log in.</p>
    <p id="authError" class="error"></p>
  </div>

  <div id="app">
    <div class="tabs">
      <button id="tabTasks" class="tab active" onclick="showTab('tasks')">Today</button>
      <button id="tabMap" class="tab" onclick="showTab('map')">Network</button>
    </div>
    <div id="tasksView">
      <h2 id="greeting">Good morning</h2>
      <div class="taskform">
        <input id="taskTitle" placeholder="Add a task" onkeydown="if(event.key==='Enter')addTask()" />
        <input id="taskDeadline" type="date" />
        <select id="taskPriority">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
        <button onclick="addTask()">Add task</button>
      </div>
      <ul id="taskList" class="tasklist"></ul>
    </div>
    <div id="mapView" style="display:none">
    <div class="toolbar">
      <div class="tgroup">
        <input id="pname" placeholder="Add a person" onkeydown="if(event.key==='Enter')addPerson()" />
        <input id="pcompany" placeholder="company" onkeydown="if(event.key==='Enter')addPerson()" />
        <input id="pknown" placeholder="known through" onkeydown="if(event.key==='Enter')addPerson()" />
        <button onclick="addPerson()">Add</button>
        <button class="iconbtn danger" title="Delete the selected node" onclick="deleteSelected()">&#128465;</button>
      </div>
      <div class="tgroup">
        <input id="searchQuery" placeholder="search by meaning" onkeydown="if(event.key==='Enter')runSearch()" />
        <button onclick="runSearch()">Search</button>
      </div>
      <details class="tools">
        <summary>Tools</summary>
        <div class="toolsmenu">
          <button class="ghost" onclick="togglePaste()">Import from a message</button>
          <div class="toolrow">
            <input id="introCompany" placeholder="who can get me into... (company)" onkeydown="if(event.key==='Enter')findPaths()" />
            <button onclick="findPaths()">Paths</button>
          </div>
          <button class="secondary" onclick="syncGraph()">Sync graph to Neo4j</button>
          <button class="secondary" onclick="reindexSearch()">Reindex search</button>
        </div>
      </details>
      <span id="addStatus" class="muted"></span>
      <span id="searchStatus" class="muted"></span>
      <span id="pathStatus" class="muted"></span>
      <span class="legend">
        <span><span class="dot" style="background:#5aa469"></span>person</span>
        <span><span class="dot" style="background:#c87f43"></span>company</span>
        <span><span class="dot" style="background:#e16347"></span>you</span>
      </span>
    </div>

    <div id="paste">
      <input id="source" placeholder="source (email, linkedin, ...)" value="email" />
      <textarea id="text" rows="4" placeholder="Paste an email or message and let AI extract people and companies..."></textarea>
      <button onclick="paste()">Extract</button>
      <span id="pasteStatus" class="muted"></span>
    </div>

    <div id="cy"></div>
    <div id="personCard" style="display:none">
      <div class="cardhead">
        <strong id="cardName"></strong>
        <button class="taskdel" onclick="closeCard()">close</button>
      </div>
      <div id="cardCompany" class="muted"></div>
      <label class="cardlabel">Role</label>
      <input id="cardTitle" placeholder="e.g. SDE1, Recruiter" />
      <label class="cardlabel">Email</label>
      <input id="cardEmail" placeholder="email" />
      <label class="cardlabel">Phone</label>
      <input id="cardPhone" placeholder="phone" />
      <label class="cardlabel">LinkedIn</label>
      <input id="cardLinkedin" placeholder="linkedin url" />
      <div class="cardactions">
        <button onclick="savePersonCard()">Save</button>
        <button id="cardEmailBtn" class="secondary" onclick="emailPerson()">Email</button>
        <button id="cardLinkedinBtn" class="secondary" onclick="openLinkedin()">LinkedIn</button>
      </div>
      <span id="cardStatus" class="muted"></span>
    </div>
    </div>
  </div>

  <script>
    function token() { return localStorage.getItem("kith_token"); }
    function setToken(t) { localStorage.setItem("kith_token", t); }
    function clearToken() { localStorage.removeItem("kith_token"); }

    function isLight() { return document.documentElement.getAttribute("data-theme") === "light"; }
    function graphFont() {
      return { color: isLight() ? "#2a2727" : "#ece6e7", size: 17, face: "Hanken Grotesk, system-ui",
               multi: true, ital: { color: "#e2546f", size: 13, face: "Hanken Grotesk, system-ui" } };
    }
    function applyTheme(theme) {
      document.documentElement.setAttribute("data-theme", theme);
      localStorage.setItem("kith_theme", theme);
      const btn = document.getElementById("themeToggle");
      if (btn) btn.innerHTML = theme === "light" ? "&#9788;" : "&#9790;";
      if (typeof network !== "undefined" && network) {
        network.setOptions({ nodes: { font: graphFont() },
          edges: { font: { color: isLight() ? "#6b6363" : "#b3aaaa" } } });
      }
    }
    function toggleTheme() {
      applyTheme(isLight() ? "dark" : "light");
    }

    async function api(path, options) {
      options = options || {};
      options.headers = Object.assign(
        { "Content-Type": "application/json" }, options.headers || {}
      );
      const t = token();
      if (t) options.headers["Authorization"] = "Bearer " + t;
      const res = await fetch(path, options);
      if (!res.ok) {
        let message = "Request failed (" + res.status + ")";
        try {
          const data = await res.json();
          if (data && data.detail) {
            message = typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail);
          }
        } catch (err) {}
        throw new Error(message);
      }
      if (res.status === 204) return null;
      const body = await res.text();
      return body ? JSON.parse(body) : null;
    }

    function showTab(name) {
      const tasks = name === "tasks";
      document.getElementById("tasksView").style.display = tasks ? "block" : "none";
      document.getElementById("mapView").style.display = tasks ? "none" : "block";
      document.getElementById("tabTasks").classList.toggle("active", tasks);
      document.getElementById("tabMap").classList.toggle("active", !tasks);
      if (tasks) loadTasks();
    }

    async function loadTasks() {
      const tasks = await api("/tasks");
      const open = tasks.filter(function (t) { return !t.done; }).length;
      document.getElementById("greeting").textContent =
        "Good morning. You have " + open + " open task" + (open === 1 ? "" : "s") + ".";
      const list = document.getElementById("taskList");
      list.innerHTML = "";
      for (const t of tasks) {
        const li = document.createElement("li");
        li.className = "taskrow" + (t.done ? " done" : "");
        const deadline = t.deadline ? '<span class="deadline">due ' + t.deadline + "</span>" : "";
        li.innerHTML =
          '<input type="checkbox" ' + (t.done ? "checked" : "") + " />" +
          '<span class="tasktitle"></span>' +
          '<span class="badge ' + t.priority + '">' + t.priority + "</span>" +
          deadline +
          '<button class="taskdel">delete</button>';
        li.querySelector(".tasktitle").textContent = t.title;
        li.querySelector("input").onchange = function (e) { toggleTask(t.id, e.target.checked); };
        li.querySelector(".taskdel").onclick = function () { deleteTask(t.id); };
        list.appendChild(li);
      }
    }

    async function addTask() {
      const title = document.getElementById("taskTitle").value.trim();
      if (!title) return;
      const deadline = document.getElementById("taskDeadline").value || null;
      const priority = document.getElementById("taskPriority").value;
      await api("/tasks", { method: "POST", body: JSON.stringify({ title: title, deadline: deadline, priority: priority }) });
      document.getElementById("taskTitle").value = "";
      document.getElementById("taskDeadline").value = "";
      loadTasks();
    }

    async function toggleTask(id, done) {
      await api("/tasks/" + id, { method: "PATCH", body: JSON.stringify({ done: done }) });
      loadTasks();
    }

    async function deleteTask(id) {
      await api("/tasks/" + id, { method: "DELETE" });
      loadTasks();
    }

    async function register() { await auth("/auth/register"); }
    async function login() { await auth("/auth/login"); }

    async function auth(path) {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const err = document.getElementById("authError");
      const isRegister = path.indexOf("register") !== -1;
      if (!email || !password) {
        err.style.color = "#f87171";
        err.textContent = "Enter an email and a password.";
        return;
      }
      err.style.color = "#94a3b8";
      err.textContent = (isRegister ? "Creating your account" : "Signing in")
        + "... (the free server can take up to a minute to wake up the first time)";
      try {
        const data = await api(path, { method: "POST", body: JSON.stringify({ email, password }) });
        setToken(data.access_token);
        showApp();
      } catch (e) {
        err.style.color = "#f87171";
        const msg = (e.message || "").toLowerCase();
        if (isRegister && msg.indexOf("already") !== -1) {
          err.textContent = "That email is already registered. Press Log in instead.";
        } else if (!isRegister && msg.indexOf("invalid") !== -1) {
          err.textContent = "Wrong email or password. New here? Press Register.";
        } else {
          err.textContent = e.message || "Something went wrong. Try again in a moment.";
        }
      }
    }

    function logout() {
      clearToken();
      document.getElementById("app").style.display = "none";
      document.getElementById("auth").style.display = "block";
      document.getElementById("logout").style.display = "none";
    }

    function showApp() {
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("logout").style.display = "inline-block";
      loadGraph();
      showTab("tasks");
    }

    function togglePaste() {
      const p = document.getElementById("paste");
      p.style.display = p.style.display === "block" ? "none" : "block";
    }

    async function addPerson() {
      const name = document.getElementById("pname").value.trim();
      const company = document.getElementById("pcompany").value.trim();
      const knownThrough = document.getElementById("pknown").value.trim();
      const status = document.getElementById("addStatus");
      if (!name) { status.textContent = "Enter a name."; return; }
      status.textContent = "Adding...";
      try {
        await api("/people", { method: "POST", body: JSON.stringify({
          name: name,
          company: company || null,
          known_through: knownThrough || null,
        }) });
        document.getElementById("pname").value = "";
        document.getElementById("pcompany").value = "";
        document.getElementById("pknown").value = "";
        status.textContent = "";
        loadGraph();
        syncGraph();
      } catch (e) { status.textContent = e.message || "Failed to add."; }
    }

    async function paste() {
      const source = document.getElementById("source").value;
      const text = document.getElementById("text").value;
      const status = document.getElementById("pasteStatus");
      status.textContent = "Extracting...";
      try {
        const result = await api("/paste", { method: "POST", body: JSON.stringify({ source, text }) });
        status.textContent = "Added " + result.people.length + " people and " + result.companies.length + " companies.";
        document.getElementById("text").value = "";
        loadGraph();
        syncGraph();
      } catch (e) { status.textContent = e.message || "Extraction failed."; }
    }

    async function syncGraph() {
      try { await api("/graph/sync", { method: "POST" }); } catch (e) {}
    }

    async function reindexSearch() {
      const status = document.getElementById("searchStatus");
      status.textContent = "Reindexing...";
      try {
        const r = await api("/search/reindex", { method: "POST" });
        status.textContent = "Indexed " + r.indexed + " people.";
      } catch (e) { status.textContent = e.message || "Reindex failed."; }
    }

    async function runSearch() {
      const q = document.getElementById("searchQuery").value.trim();
      if (!q) return;
      const status = document.getElementById("searchStatus");
      status.textContent = "Searching...";
      try {
        const data = await api("/search?q=" + encodeURIComponent(q));
        if (!data.results.length) { status.textContent = "No matches. Try Reindex first."; return; }
        status.textContent = data.results
          .map(function (r) { return r.name + (r.company ? " (" + r.company + ")" : ""); })
          .join(", ");
      } catch (e) { status.textContent = e.message || "Search failed."; }
    }

    async function findPaths() {
      const company = document.getElementById("introCompany").value.trim();
      const status = document.getElementById("pathStatus");
      if (!company) { status.textContent = "Enter a company."; return; }
      status.textContent = "Syncing and searching...";
      try {
        await api("/graph/sync", { method: "POST" });
        const result = await api("/intro-paths?company=" + encodeURIComponent(company));
        if (!result.paths.length) {
          status.textContent = "No warm path to " + company + " found.";
          return;
        }
        const lines = result.paths.map(function (p) { return p.join(" -> "); });
        status.textContent = "Paths: " + lines.join("  |  ");
      } catch (e) { status.textContent = e.message || "Search failed."; }
    }

    const options = {
      physics: {
        enabled: true,
        solver: "forceAtlas2Based",
        forceAtlas2Based: {
          gravitationalConstant: -60,
          centralGravity: 0.002,
          springLength: 150,
          springConstant: 0.02,
          damping: 0.55,
          avoidOverlap: 1,
        },
        stabilization: false,
        minVelocity: 0.05,
        timestep: 0.3,
      },
      interaction: { hover: true, dragNodes: true, dragView: true, zoomView: true },
      nodes: {
        borderWidth: 2,
        font: { color: "#f3ece8", size: 17, face: "Mulish, system-ui", multi: "md",
                ital: { color: "#f0b99f", size: 13, face: "Mulish, system-ui" } },
        shadow: { enabled: true, color: "rgba(0,0,0,0.5)", size: 16, x: 0, y: 4 },
      },
      edges: {
        color: { color: "#6b5f5a", highlight: "#cbb9b0", hover: "#8a7c75" },
        width: 1.5,
        smooth: { enabled: true, type: "continuous" },
        font: { color: "#b3a59d", size: 11, strokeWidth: 0, align: "top", face: "Mulish, system-ui" },
        arrows: { to: { enabled: true, scaleFactor: 0.55 } },
      },
    };

    let cardPersonId = null;

    async function openPersonCard(personId) {
      cardPersonId = personId;
      const d = await api("/people/" + personId);
      document.getElementById("cardName").textContent = d.name;
      document.getElementById("cardCompany").textContent = d.company || "";
      document.getElementById("cardTitle").value = d.title || "";
      document.getElementById("cardEmail").value = d.email || "";
      document.getElementById("cardPhone").value = d.phone || "";
      document.getElementById("cardLinkedin").value = d.linkedin || "";
      document.getElementById("cardEmailBtn").style.display = d.email ? "inline-block" : "none";
      document.getElementById("cardLinkedinBtn").style.display = d.linkedin ? "inline-block" : "none";
      document.getElementById("cardStatus").textContent = "";
      document.getElementById("personCard").style.display = "block";
    }

    function closeCard() {
      document.getElementById("personCard").style.display = "none";
      cardPersonId = null;
    }

    async function savePersonCard() {
      if (!cardPersonId) return;
      const body = {
        title: document.getElementById("cardTitle").value,
        email: document.getElementById("cardEmail").value,
        phone: document.getElementById("cardPhone").value,
        linkedin: document.getElementById("cardLinkedin").value,
      };
      document.getElementById("cardStatus").textContent = "Saving...";
      try {
        await api("/people/" + cardPersonId, { method: "PATCH", body: JSON.stringify(body) });
        document.getElementById("cardStatus").textContent = "Saved.";
        openPersonCard(cardPersonId);
      } catch (e) { document.getElementById("cardStatus").textContent = e.message || "Save failed."; }
    }

    function emailPerson() {
      const email = document.getElementById("cardEmail").value.trim();
      if (!email) return;
      window.open("https://mail.google.com/mail/?view=cm&fs=1&to=" + encodeURIComponent(email), "_blank");
    }

    function openLinkedin() {
      let url = document.getElementById("cardLinkedin").value.trim();
      if (!url) return;
      if (url.indexOf("http") !== 0) url = "https://" + url;
      window.open(url, "_blank");
    }

    let network, nodesDS, edgesDS;
    function toVisNode(n) {
      if (n.type === "you") {
        return {
          id: n.id,
          label: "**You**",
          shape: "dot",
          size: 30,
          color: { background: "#e2546f", border: "#f7a7b4",
                   highlight: { background: "#f36b82", border: "#ffd0d5" } },
        };
      }
      const isCompany = n.type === "company";
      let label = n.label;
      if (!isCompany && n.sublabel) {
        label = "**" + n.label + "**\n_(" + n.sublabel + ")_";
      }
      return {
        id: n.id,
        label: label,
        shape: isCompany ? "hexagon" : "dot",
        size: isCompany ? 28 : 19,
        color: isCompany
          ? { background: "#6f86c9", border: "#a6b6e0", highlight: { background: "#8499d4", border: "#c2cdec" } }
          : { background: "#5fb98e", border: "#97dab8", highlight: { background: "#74c79e", border: "#b3e6cd" } },
      };
    }

    function edgeId(e) { return e.source + "->" + e.target + ":" + e.label; }
    function toVisEdge(e) {
      const isWork = e.label === "WORKS_AT";
      return {
        id: edgeId(e),
        from: e.source,
        to: e.target,
        label: e.label,
        color: { color: isWork ? "#8a7f7f" : "#e2546f",
                 highlight: "#f36b82", hover: "#b3aaaa" },
        dashes: isWork ? false : [6, 4],
      };
    }

    let selectedNode = null;
    function onNodeClick(params) {
      if (!params.nodes || !params.nodes.length) { selectedNode = null; return; }
      const id = params.nodes[0];
      const node = nodesDS.get(id);
      if (!node) return;
      selectedNode = { id: id, label: node.label };
      const status = document.getElementById("addStatus");
      if (id === "you") {
        document.getElementById("pknown").value = "";
        status.textContent = "Adding a contact you know directly. Enter a name.";
      } else if (id.indexOf("person:") === 0) {
        document.getElementById("pknown").value = node.label;
        status.textContent =
          "Adding someone " + node.label + " knows. Or use Delete selected to remove " + node.label + ".";
        openPersonCard(id.split(":")[1]);
      } else if (id.indexOf("company:") === 0) {
        status.textContent =
          "Selected " + node.label + ". Use Delete selected to remove it.";
      }
      document.getElementById("pname").focus();
    }

    async function deleteSelected() {
      const status = document.getElementById("addStatus");
      if (!selectedNode) { status.textContent = "Click a node first, then Delete selected."; return; }
      const id = selectedNode.id;
      if (id === "you") { status.textContent = "The You node cannot be deleted."; return; }
      if (!confirm("Delete " + selectedNode.label + "?")) return;
      let path = null;
      if (id.indexOf("person:") === 0) path = "/people/" + id.split(":")[1];
      else if (id.indexOf("company:") === 0) path = "/companies/" + id.split(":")[1];
      else return;
      status.textContent = "Deleting...";
      try {
        await api(path, { method: "DELETE" });
        selectedNode = null;
        status.textContent = "Deleted.";
        await loadGraph();
        syncGraph();
      } catch (e) { status.textContent = e.message || "Delete failed."; }
    }

    async function loadGraph() {
      const graph = await api("/graph");
      if (!network) {
        nodesDS = new vis.DataSet(graph.nodes.map(toVisNode));
        edgesDS = new vis.DataSet(graph.edges.map(toVisEdge));
        network = new vis.Network(document.getElementById("cy"),
          { nodes: nodesDS, edges: edgesDS }, options);
        network.on("click", onNodeClick);
        network.setOptions({ nodes: { font: graphFont() },
          edges: { font: { color: isLight() ? "#6b6363" : "#b3aaaa" } } });
        return;
      }
      // add only what is new so existing nodes keep drifting from where they are
      const serverNodeIds = new Set(graph.nodes.map(function (n) { return n.id; }));
      const haveNodes = new Set(nodesDS.getIds());
      const newNodes = graph.nodes
        .filter(function (n) { return !haveNodes.has(n.id); })
        .map(toVisNode);
      const serverEdges = graph.edges.map(toVisEdge);
      const serverEdgeIds = new Set(serverEdges.map(function (e) { return e.id; }));
      const haveEdges = new Set(edgesDS.getIds());
      const newEdges = serverEdges.filter(function (e) { return !haveEdges.has(e.id); });
      // remove nodes and edges that no longer exist on the server (deletions)
      const staleNodes = nodesDS.getIds().filter(function (id) { return !serverNodeIds.has(id); });
      const staleEdges = edgesDS.getIds().filter(function (id) { return !serverEdgeIds.has(id); });
      if (staleEdges.length) edgesDS.remove(staleEdges);
      if (staleNodes.length) nodesDS.remove(staleNodes);
      if (newNodes.length) nodesDS.add(newNodes);
      if (newEdges.length) edgesDS.add(newEdges);
    }

    applyTheme(localStorage.getItem("kith_theme") || "dark");
    if (token()) { showApp(); }
  </script>
</body>
</html>
