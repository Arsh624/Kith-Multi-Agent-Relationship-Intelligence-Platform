<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kith</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    :root { --bg: #0b1020; --panel: #0f172a; --line: #1e293b; --text: #e2e8f0; --muted: #94a3b8; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: var(--bg); color: var(--text); }
    header { padding: 12px 20px; background: var(--panel); border-bottom: 1px solid var(--line);
             display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; margin: 0; letter-spacing: 0.5px; }
    #auth { max-width: 360px; margin: 80px auto; padding: 24px; background: var(--panel);
            border: 1px solid var(--line); border-radius: 12px; }
    #app { display: none; }
    input, textarea, button { font: inherit; }
    input, textarea { width: 100%; padding: 9px 11px; margin: 5px 0; background: #0b1224;
                      color: var(--text); border: 1px solid var(--line); border-radius: 8px; }
    input::placeholder, textarea::placeholder { color: #5b6b85; }
    button { background: #6366f1; color: #fff; border: none; border-radius: 8px;
             cursor: pointer; padding: 9px 14px; font-weight: 600; }
    button.secondary { background: #334155; }
    button.ghost { background: transparent; color: var(--muted); padding: 4px 0; font-weight: 500; }
    .toolbar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
               padding: 14px 20px; border-bottom: 1px solid var(--line); background: rgba(15,23,42,0.6); }
    .toolbar input { width: auto; flex: 1; min-width: 140px; margin: 0; }
    #paste { display: none; padding: 14px 20px; border-bottom: 1px solid var(--line);
             background: rgba(15,23,42,0.4); }
    #cy { height: calc(100vh - 130px); background:
          radial-gradient(circle at 50% 40%, #131a30 0%, var(--bg) 70%); }
    .muted { color: var(--muted); font-size: 13px; }
    .error { color: #f87171; font-size: 13px; }
    h2 { font-weight: 600; }
    .legend { display: flex; gap: 16px; align-items: center; margin-left: auto; color: var(--muted); font-size: 12px; }
    .dot { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  </style>
</head>
<body>
  <header>
    <h1>Kith</h1>
    <button id="logout" class="secondary" style="display:none" onclick="logout()">Log out</button>
  </header>

  <div id="auth">
    <h2>Sign in</h2>
    <input id="email" type="email" placeholder="email" />
    <input id="password" type="password" placeholder="password" />
    <div style="display:flex; gap:8px; margin-top:6px;">
      <button onclick="login()">Log in</button>
      <button class="secondary" onclick="register()">Register</button>
    </div>
    <p id="authError" class="error"></p>
  </div>

  <div id="app">
    <div class="toolbar">
      <input id="pname" placeholder="Add a person (name)" onkeydown="if(event.key==='Enter')addPerson()" />
      <input id="pcompany" placeholder="company (optional)" onkeydown="if(event.key==='Enter')addPerson()" />
      <input id="pknown" placeholder="known through (optional)" onkeydown="if(event.key==='Enter')addPerson()" />
      <button onclick="addPerson()">Add</button>
      <button class="ghost" onclick="togglePaste()">Import from a message</button>
      <span id="addStatus" class="muted"></span>
      <span class="legend">
        <span><span class="dot" style="background:#10b981"></span>person</span>
        <span><span class="dot" style="background:#6366f1"></span>company</span>
      </span>
    </div>

    <div id="paste">
      <input id="source" placeholder="source (email, linkedin, ...)" value="email" />
      <textarea id="text" rows="4" placeholder="Paste an email or message and let AI extract people and companies..."></textarea>
      <button onclick="paste()">Extract</button>
      <span id="pasteStatus" class="muted"></span>
    </div>

    <div id="cy"></div>
  </div>

  <script>
    function token() { return localStorage.getItem("kith_token"); }
    function setToken(t) { localStorage.setItem("kith_token", t); }
    function clearToken() { localStorage.removeItem("kith_token"); }

    async function api(path, options) {
      options = options || {};
      options.headers = Object.assign(
        { "Content-Type": "application/json" }, options.headers || {}
      );
      const t = token();
      if (t) options.headers["Authorization"] = "Bearer " + t;
      const res = await fetch(path, options);
      if (!res.ok) {
        let message = "Request failed (" + res.status + ")";
        try {
          const data = await res.json();
          if (data && data.detail) {
            message = typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail);
          }
        } catch (err) {}
        throw new Error(message);
      }
      return res.json();
    }

    async function register() { await auth("/auth/register"); }
    async function login() { await auth("/auth/login"); }

    async function auth(path) {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      document.getElementById("authError").textContent = "";
      try {
        const data = await api(path, { method: "POST", body: JSON.stringify({ email, password }) });
        setToken(data.access_token);
        showApp();
      } catch (e) {
        document.getElementById("authError").textContent = "Could not authenticate. Check your details.";
      }
    }

    function logout() {
      clearToken();
      document.getElementById("app").style.display = "none";
      document.getElementById("auth").style.display = "block";
      document.getElementById("logout").style.display = "none";
    }

    function showApp() {
      document.getElementById("auth").style.display = "none";
      document.getElementById("app").style.display = "block";
      document.getElementById("logout").style.display = "inline-block";
      loadGraph();
    }

    function togglePaste() {
      const p = document.getElementById("paste");
      p.style.display = p.style.display === "block" ? "none" : "block";
    }

    async function addPerson() {
      const name = document.getElementById("pname").value.trim();
      const company = document.getElementById("pcompany").value.trim();
      const knownThrough = document.getElementById("pknown").value.trim();
      const status = document.getElementById("addStatus");
      if (!name) { status.textContent = "Enter a name."; return; }
      status.textContent = "Adding...";
      try {
        await api("/people", { method: "POST", body: JSON.stringify({
          name: name,
          company: company || null,
          known_through: knownThrough || null,
        }) });
        document.getElementById("pname").value = "";
        document.getElementById("pcompany").value = "";
        document.getElementById("pknown").value = "";
        status.textContent = "";
        loadGraph();
      } catch (e) { status.textContent = e.message || "Failed to add."; }
    }

    async function paste() {
      const source = document.getElementById("source").value;
      const text = document.getElementById("text").value;
      const status = document.getElementById("pasteStatus");
      status.textContent = "Extracting...";
      try {
        const result = await api("/paste", { method: "POST", body: JSON.stringify({ source, text }) });
        status.textContent = "Added " + result.people.length + " people and " + result.companies.length + " companies.";
        document.getElementById("text").value = "";
        loadGraph();
      } catch (e) { status.textContent = e.message || "Extraction failed."; }
    }

    const options = {
      physics: {
        enabled: true,
        solver: "forceAtlas2Based",
        forceAtlas2Based: {
          gravitationalConstant: -60,
          centralGravity: 0.002,
          springLength: 150,
          springConstant: 0.02,
          damping: 0.55,
          avoidOverlap: 1,
        },
        stabilization: false,
        minVelocity: 0.05,
        timestep: 0.3,
      },
      interaction: { hover: true, dragNodes: true, dragView: true, zoomView: true },
      nodes: {
        borderWidth: 2,
        font: { color: "#e2e8f0", size: 15, face: "system-ui" },
        shadow: { enabled: true, color: "rgba(0,0,0,0.45)", size: 14, x: 0, y: 3 },
      },
      edges: {
        color: { color: "#3b4862", highlight: "#94a3b8", hover: "#64748b" },
        width: 1.5,
        smooth: { enabled: true, type: "continuous" },
        font: { color: "#7c8aa5", size: 10, strokeWidth: 0, align: "top" },
        arrows: { to: { enabled: true, scaleFactor: 0.55 } },
      },
    };

    let network, nodesDS, edgesDS;
    function toVisNode(n) {
      if (n.type === "you") {
        return {
          id: n.id,
          label: n.label,
          shape: "dot",
          size: 28,
          color: { background: "#f59e0b", border: "#fcd34d",
                   highlight: { background: "#fbbf24", border: "#fde68a" } },
        };
      }
      const isCompany = n.type === "company";
      return {
        id: n.id,
        label: n.label,
        shape: isCompany ? "hexagon" : "dot",
        size: isCompany ? 24 : 16,
        color: isCompany
          ? { background: "#6366f1", border: "#a5b4fc", highlight: { background: "#818cf8", border: "#c7d2fe" } }
          : { background: "#10b981", border: "#6ee7b7", highlight: { background: "#34d399", border: "#a7f3d0" } },
      };
    }

    function edgeId(e) { return e.source + "->" + e.target + ":" + e.label; }
    function toVisEdge(e) {
      const isWork = e.label === "WORKS_AT";
      return {
        id: edgeId(e),
        from: e.source,
        to: e.target,
        label: e.label,
        color: { color: isWork ? "#3b4862" : "#0e7490",
                 highlight: "#94a3b8", hover: "#64748b" },
        dashes: isWork ? false : [6, 4],
      };
    }

    async function loadGraph() {
      const graph = await api("/graph");
      if (!network) {
        nodesDS = new vis.DataSet(graph.nodes.map(toVisNode));
        edgesDS = new vis.DataSet(graph.edges.map(toVisEdge));
        network = new vis.Network(document.getElementById("cy"),
          { nodes: nodesDS, edges: edgesDS }, options);
        return;
      }
      // add only what is new so existing nodes keep drifting from where they are
      const haveNodes = new Set(nodesDS.getIds());
      const newNodes = graph.nodes
        .filter(function (n) { return !haveNodes.has(n.id); })
        .map(toVisNode);
      const haveEdges = new Set(edgesDS.getIds());
      const newEdges = graph.edges
        .map(toVisEdge)
        .filter(function (e) { return !haveEdges.has(e.id); });
      if (newNodes.length) nodesDS.add(newNodes);
      if (newEdges.length) edgesDS.add(newEdges);
    }

    if (token()) { showApp(); }
  </script>
</body>
</html>
