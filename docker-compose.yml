services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kith
      POSTGRES_PASSWORD: kith
      POSTGRES_DB: kith
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kith"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/kithkithkith
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4jdata:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrantdata:/qdrant/storage

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://kith:kith@db:5432/kith
      JWT_SECRET: dev-secret-change-me
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  neo4jdata:
  qdrantdata:
